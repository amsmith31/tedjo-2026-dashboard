<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROMULUS — Tedjo 2026 Intelligence</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#111823; --panel2:#0d141d; --line:#1e2a3a;
    --gold:#e0b84c; --gold-dim:#a8863250; --text:#d7dee8; --muted:#8b98a9; --faint:#5c6b7d;
    --red:#e5534b; --red-dim:#e5534b22; --green:#3fb950; --blue:#58a6ff;
    --t-very:#e0b84c; --t-strong:#e5843b; --t-medium:#d0d64c; --t-adequate:#6b7c8f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex}
  a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#22303f;border-radius:5px}

  /* Sidebar */
  .sidebar{width:230px;min-width:230px;height:100vh;background:linear-gradient(180deg,#0c1219,#0a0e14);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0}
  .brand{padding:20px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .logo{font-weight:800;letter-spacing:3px;font-size:20px;color:var(--gold)}
  .brand .logo:after{content:"●";color:var(--red);font-size:10px;vertical-align:middle;margin-left:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
  .nav{padding:10px 8px;flex:1;overflow:auto}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--muted);
    padding:10px 12px;border-radius:7px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;font-weight:500}
  .nav button:hover{background:#131c27;color:var(--text)}
  .nav button.active{background:var(--gold-dim);color:var(--gold);box-shadow:inset 2px 0 0 var(--gold)}
  .nav .ico{width:18px;text-align:center;opacity:.9}
  .nav .ct{margin-left:auto;font-size:11px;color:var(--faint);background:#0e1620;padding:1px 7px;border-radius:10px}
  .side-foot{padding:12px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--faint)}
  .side-foot b{color:var(--muted)}

  /* Main */
  .main{flex:1;height:100vh;overflow:auto;padding:0}
  .topbar{position:sticky;top:0;z-index:5;background:#0a0e14ee;backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:16px 30px;display:flex;align-items:center;justify-content:space-between}
  .topbar h2{margin:0;font-size:17px;font-weight:700;letter-spacing:.3px}
  .topbar .crumb{color:var(--faint);font-size:12px;margin-top:2px}
  .countdown{font-size:12px;color:var(--muted);text-align:right}
  .countdown b{color:var(--gold);font-size:15px}
  .view{padding:26px 30px;animation:fade .4s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hidden{display:none!important}
  /* ── mobile drawer nav ── */
  #menuBtn{display:none;background:none;border:1px solid var(--line);color:var(--gold);font-size:18px;line-height:1;padding:5px 12px;border-radius:8px;cursor:pointer}
  #scrim{display:none;position:fixed;inset:0;background:rgba(4,6,10,.62);z-index:40;opacity:0;pointer-events:none}
  body.nav-open #scrim{opacity:1!important;pointer-events:auto!important}
  @media (max-width:820px){
    #menuBtn{display:inline-flex;align-items:center}
    #scrim{display:block}
    .sidebar{position:fixed;top:0;left:-270px;height:100vh;width:250px;max-width:82vw;
      z-index:50;overflow-y:auto;border-right:1px solid var(--line);border-bottom:none;box-shadow:2px 0 24px rgba(0,0,0,.5)}
    body.nav-open .sidebar{left:0}
    .side-foot{display:block}
    .main{height:auto;overflow:visible;width:100%}
    .topbar{padding:11px 14px;position:sticky;top:0;z-index:10;gap:10px;align-items:center}
    .topbar h2{font-size:16px}
    .countdown{font-size:11px;text-align:right}
    .view{padding:16px 14px}
    .tiles{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
    .tile .n{font-size:24px}
    table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;max-width:100%}
    .atk .hd h3{font-size:15px}
    .msg{max-width:92%}
    .cand{flex-wrap:wrap}
    .vid{flex:0 0 140px}
    .chatbar{flex-wrap:wrap} .chatbar button{padding:10px 18px}
    .rs-logo{letter-spacing:6px}
    #splash.has-video #splash-vid{object-fit:contain!important;background:#04060a}
    #splash-skip{top:12px;right:12px}
  }

  /* Bits */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
  .tile .n{font-size:30px;font-weight:800;color:var(--gold);line-height:1}
  .tile .l{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.3px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:18px 20px;margin-bottom:14px}
  .pitch{background:linear-gradient(135deg,#111823,#0d1a17);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:10px;padding:18px 22px;margin-bottom:22px;color:var(--text)}
  .pitch h3{margin:0 0 8px;color:var(--gold);font-size:15px}
  .pitch p{margin:6px 0;color:var(--muted)}
  .sect-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);margin:8px 0 14px}

  /* tier badges */
  .tier{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    padding:3px 9px;border-radius:20px;border:1px solid currentColor}
  .tier.very{color:var(--t-very)} .tier.strong{color:var(--t-strong)}
  .tier.medium{color:var(--t-medium)} .tier.adequate{color:var(--t-adequate)}
  .vbadge{font-size:10.5px;padding:2px 8px;border-radius:5px;font-weight:600}
  .vbadge.CONFIRMED{background:#1b3a2422;color:var(--green);border:1px solid #2ea04333}
  .vbadge.PARTIAL{background:#3a2f1b22;color:var(--gold);border:1px solid #a8863233}
  .vbadge.CONTEXT{background:#2a303a;color:var(--muted);border:1px solid var(--line)}

  /* attack card */
  .atk{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0;margin-bottom:16px;overflow:hidden}
  .atk .hd{display:flex;align-items:flex-start;gap:12px;padding:16px 20px 12px;border-bottom:1px solid var(--line)}
  .atk .hd h3{margin:0;font-size:16px;flex:1;line-height:1.35}
  .atk .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .atk .bd{padding:14px 20px;color:var(--text)}
  .atk .bd .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin:14px 0 4px}
  .atk .ev{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--muted)}
  .atk .quote{border-left:2px solid var(--gold-dim);padding:4px 0 4px 12px;color:var(--muted);font-style:italic;margin:8px 0}
  .atk .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:12px 20px;background:var(--panel2);border-top:1px solid var(--line);font-size:12px;color:var(--faint)}
  .srcbtn{background:var(--gold-dim);color:var(--gold)!important;border:1px solid var(--gold-dim);padding:6px 12px;border-radius:6px;font-weight:600;font-size:12px}
  .srcbtn:hover{background:#a886321f;text-decoration:none}
  .chip{font-size:11px;color:var(--muted);background:#0e1620;border:1px solid var(--line);padding:2px 9px;border-radius:12px}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg)}
  td{padding:9px 10px;border-bottom:1px solid #141d28;vertical-align:top}
  tr:hover td{background:#0e1620}
  .vote-NO{color:var(--red);font-weight:700}
  .vote-ABSENT{color:var(--gold);font-weight:700}
  .vote-YES{color:var(--muted)}
  .fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .fbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:6px 13px;border-radius:16px;font-size:12.5px;cursor:pointer}
  .fbtn:hover{border-color:var(--gold-dim);color:var(--text)}
  .fbtn.on{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-dim);font-weight:600}
  /* HQ (multi-tenant selector) */
  .hq-muni-h{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin:18px 0 8px;font-weight:700}
  .hq-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .hq-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .15s}
  .hq-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .hq-card.pending{opacity:.55;cursor:not-allowed}
  .hq-card.pending:hover{transform:none;border-color:var(--line)}
  .hq-av{width:42px;height:42px;border-radius:50%;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;border:1px solid var(--gold-dim)}
  .hq-status{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--faint);white-space:nowrap}
  .hq-status.on{color:var(--green)}
  .searchbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .searchbar input,.searchbar select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:9px 12px;border-radius:7px;font-size:13px}
  .searchbar input{flex:1;min-width:220px}
  .loading{padding:60px;text-align:center;color:var(--muted)}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cand{display:flex;gap:16px;align-items:center}
  .cand .av{width:52px;height:52px;border-radius:50%;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;border:1px solid var(--gold-dim)}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  /* candidate profile */
  .profile{border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:13.5px;color:var(--text);line-height:1.6}
  .profile b{color:var(--gold);font-weight:700} .profile ul{margin:6px 0 10px;padding-left:18px} .profile li{margin:3px 0;color:var(--muted)}
  .profile i{color:var(--faint);font-style:italic} .profile a{color:var(--blue)}
  .vidrow{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
  .vid{flex:0 0 160px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden;text-decoration:none;color:var(--text)}
  .vid:hover{border-color:var(--gold-dim);text-decoration:none}
  .vid img{width:100%;height:90px;object-fit:cover;display:block}
  .vid .vt{font-size:11.5px;padding:6px 8px 2px;line-height:1.3}
  .vid .vm{font-size:10.5px;color:var(--faint);padding:0 8px 7px}
  /* chat */
  .chatlog{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;min-height:120px}
  .msg{max-width:80%;padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.6}
  .msg.user{align-self:flex-end;background:var(--gold-dim);color:var(--text);border:1px solid var(--gold-dim)}
  .msg.bot{align-self:flex-start;background:var(--panel);border:1px solid var(--line)}
  .msg.bot a{color:var(--blue)} .msg.bot h4{margin:10px 0 4px;color:var(--gold);font-size:14px}
  .msg.bot ul{margin:6px 0;padding-left:18px} .msg.bot code{background:#0d141d;padding:1px 5px;border-radius:4px}
  .msg.think{color:var(--faint);font-style:italic}
  .chatbar{display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg);padding-top:6px}
  .chatbar textarea{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px 14px;font:14px inherit;resize:none;max-height:140px}
  .chatbar button{background:var(--gold);color:#0a0e14;border:none;border-radius:9px;padding:0 22px;font-weight:700;cursor:pointer}
  .chatbar button:disabled{opacity:.5;cursor:default}
  .chatsug{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chatsug button{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:16px;padding:6px 13px;font-size:12.5px;cursor:pointer}
  .chatsug button:hover{border-color:var(--gold-dim);color:var(--gold)}
  /* splash */
  #splash{position:fixed;inset:0;z-index:1000;background:radial-gradient(circle at 50% 38%,#0e1622,#04060a 72%);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  #splash.gone{opacity:0;pointer-events:none;transition:opacity .6s ease}
  #splash-vid{display:none} #splash.has-video #splash-vid{display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #splash.has-video #splash-inner{display:none}
  #splash-skip{display:none;position:absolute;top:18px;right:22px;z-index:3;background:#0a0e14aa;border:1px solid var(--line);
    color:var(--muted);padding:7px 15px;border-radius:6px;cursor:pointer;font-size:12px}
  #pwgate{text-align:center;padding:20px;position:relative;z-index:2}
  .pw-row{display:flex;gap:10px;justify-content:center;margin-top:6px}
  #pw-input{background:#0a0e14;border:1px solid var(--gold-dim);color:var(--gold);font-family:ui-monospace,Menlo,Consolas,monospace;
    padding:12px 18px;border-radius:9px;font-size:15px;letter-spacing:3px;width:min(300px,68vw);text-align:center}
  #pw-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 18px rgba(224,184,76,.3)}
  .pw-row button{background:var(--gold);color:#05070b;border:none;padding:0 22px;border-radius:9px;font-weight:800;cursor:pointer;font-size:14px}
  #pw-err{color:var(--red);font-family:ui-monospace,monospace;font-size:13px;margin-top:16px;height:16px;letter-spacing:2px}
  #splash.shake{animation:rsShake .4s}
  @keyframes rsShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  #splash-skip:hover{color:var(--gold);border-color:var(--gold-dim)}
  #splash-inner{text-align:center;padding:20px;display:none}
  #splash-gate{display:none;position:absolute;inset:0;z-index:2;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(circle at 50% 50%,transparent,rgba(5,7,11,.45))}
  #splash-gate button{background:var(--gold);color:#05070b;border:none;padding:14px 38px;border-radius:11px;font-weight:800;font-size:16px;letter-spacing:1.5px;cursor:pointer;box-shadow:0 0 34px rgba(224,184,76,.45);transition:transform .15s}
  #splash-gate button:hover{transform:scale(1.04)}
  #splash-gate label{color:#d7dee8;font-size:12px;cursor:pointer;background:rgba(5,7,11,.55);padding:6px 12px;border-radius:6px}
  .rs-logo{font-size:clamp(42px,8vw,72px);font-weight:800;letter-spacing:12px;color:var(--gold);
    text-shadow:0 0 34px rgba(224,184,76,.45);animation:rsGlitch 3s infinite}
  .rs-logo:after{content:"●";color:var(--red);font-size:14px;vertical-align:super;margin-left:8px;animation:pulse 1.6s infinite}
  .rs-tag{color:var(--muted);letter-spacing:4px;font-size:12px;margin-top:10px}
  .rs-boot{font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--green);font-size:13px;
    margin:30px auto 18px;min-height:120px;text-align:left;width:min(460px,84vw)}
  .rs-boot .ln{opacity:0;animation:rsIn .35s forwards;padding:2px 0}
  .rs-enter{opacity:0;transition:opacity .5s ease}
  .rs-enter button{background:var(--gold);color:#05070b;border:none;padding:11px 30px;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px}
  .rs-enter label{display:block;margin-top:14px;color:var(--faint);font-size:12px;cursor:pointer}
  @keyframes rsIn{to{opacity:1}}
  @keyframes rsGlitch{0%,92%,100%{text-shadow:0 0 34px rgba(224,184,76,.45)}
    93%{text-shadow:-2px 0 var(--red),2px 0 var(--blue)}95%{text-shadow:2px 0 var(--red),-2px 0 var(--blue)}}
  @media (prefers-reduced-motion:reduce){.rs-logo{animation:none}.rs-boot .ln{animation:none;opacity:1}}
</style>
</head>
<body>
  <div id="splash">
    <video id="splash-vid" playsinline preload="auto"><source src="opener.mp4" type="video/mp4"></video>
    <button id="splash-skip">⏭ Skip Intro</button>
    <div id="pwgate">
      <div class="rs-logo">ROMULUS</div>
      <div class="rs-tag">CAMPAIGN INTELLIGENCE · MISSISSAUGA 2026</div>
      <div class="rs-boot" id="pw-boot"></div>
      <div class="pw-row">
        <input id="pw-input" type="password" placeholder="ACCESS CODE" autocomplete="off" spellcheck="false">
        <button id="pw-enter">Enter ▸</button>
      </div>
      <div id="pw-err"></div>
    </div>
  </div>
  <script>(function(){
    var PW="Satorus2026";
    var sp=document.getElementById('splash'), gate=document.getElementById('pwgate'),
        v=document.getElementById('splash-vid'), skip=document.getElementById('splash-skip'),
        boot=document.getElementById('pw-boot'), inp=document.getElementById('pw-input');
    var lines=["▸ SECURE SESSION ......... established",
      "▸ COUNCIL RECORD ......... 73 meetings · 1,004 votes",
      "▸ PRIMARY SOURCES ........ 998 verified",
      "▸ OPPO FINDINGS .......... 11 ranked",
      "▸ CANDIDATE PROFILES ..... 6 loaded",
      "▸ VIDEO INTEL ............ 95 clips",
      "▸ NEWS FEED .............. live",
      "▸ AWAITING ACCESS CODE_"];
    var i=0;(function tick(){ if(i<lines.length){ var d=document.createElement('div'); d.className='ln';
      d.textContent=lines[i]; boot.appendChild(d); i++; setTimeout(tick,260);} else { try{inp.focus();}catch(e){} } })();
    function dismiss(){ sp.classList.add('gone'); setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); },650); }
    function playVideo(){ gate.style.display='none'; sp.classList.add('has-video'); skip.style.display='block';
      v.muted=false; v.play().catch(function(){ v.muted=true; v.play().catch(dismiss); }); }
    v.addEventListener('ended',dismiss);
    v.addEventListener('error',function(){ if(sp.classList.contains('has-video')) dismiss(); });
    skip.onclick=dismiss;
    function submit(){ if(inp.value===PW){ playVideo(); }
      else { document.getElementById('pw-err').textContent='✖ ACCESS DENIED'; inp.value='';
        sp.classList.add('shake'); setTimeout(function(){ sp.classList.remove('shake'); },420); try{inp.focus();}catch(e){} } }
    document.getElementById('pw-enter').onclick=submit;
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
  })();</script>
  <div id="scrim"></div>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">ROMULUS</div>
      <div class="sub">CAMPAIGN INTELLIGENCE</div>
    </div>
    <nav class="nav" id="nav">
      <button data-tab="hq" class="active"><span class="ico">⌂</span> Municipality</button>
      <button data-tab="home"><span class="ico">◆</span> Overview</button>
      <button data-tab="romulus"><span class="ico">✦</span> ROMULUS Chat</button>
      <button data-tab="message"><span class="ico">★</span> My Message <span class="ct" id="ct-message"></span></button>
      <button data-tab="attacks"><span class="ico">⚑</span> OPPO <span class="ct" id="ct-attacks"></span></button>
      <button data-tab="promises"><span class="ico">◎</span> Promises <span class="ct" id="ct-promises"></span></button>
      <button data-tab="council"><span class="ico">▤</span> Council Record <span class="ct" id="ct-council"></span></button>
      <button data-tab="evidence"><span class="ico">◈</span> Evidence <span class="ct" id="ct-evidence"></span></button>
      <button data-tab="candidates"><span class="ico">☰</span> Candidates <span class="ct" id="ct-cand"></span></button>
      <button data-tab="news"><span class="ico">◰</span> News <span class="ct" id="ct-news"></span></button>
      <button data-tab="web"><span class="ico">◱</span> Web Presence <span class="ct" id="ct-web"></span></button>
      <button data-tab="ads"><span class="ico">◲</span> Political Ads <span class="ct" id="ct-ads"></span></button>
    </nav>
    <div class="side-foot">
      <div id="activeClient" style="color:var(--muted)">No client selected</div>
      <span id="conn" class="faint">—</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button id="menuBtn" aria-label="Open menu">☰</button>

const S = { attacks:[], evidence:[], candidates:[], dissents:[], web:[], message:[], promises:[], news:[], newsLinks:[], sources:[], ads:[], videos:[], counts:{} };

function renderCouncil(){
  const all=S.dissents.map(d=>{ const m=d.council_motions||{};
    return {date:m.motion_date, topic:m.topic||"", outcome:m.outcome||"", vote:d.vote, cat:posCat(d.vote), src:d.source_url}; })
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const c={NO:0,ABSENT:0,YES:0,UNCLEAR:0,OTHER:0}; all.forEach(r=>c[r.cat]++);
  const sets={notable:r=>r.cat==="NO"||r.cat==="ABSENT", NO:r=>r.cat==="NO", ABSENT:r=>r.cat==="ABSENT", YES:r=>r.cat==="YES", all:()=>true};
  const chip=(k,l)=>`<button class="fbtn ${_cf===k?'on':''}" data-f="${k}">${l}</button>`;
  document.getElementById("view-council").innerHTML=`
    <div class="pitch"><p style="margin:0">Tedjo's full voting record: <b>${c.NO}</b> dissents (NO) · <b>${c.ABSENT}</b> absences — didn't vote, often a conflict-of-interest recusal · <b>${c.YES}</b> supported (YES) · ${c.UNCLEAR} not individually recorded in the minutes. Every row links to the official source.</p></div>
    <div class="fbar">${chip('notable','★ Notable ('+(c.NO+c.ABSENT)+')')}${chip('NO','Dissents ('+c.NO+')')}${chip('ABSENT','Absences ('+c.ABSENT+')')}${chip('YES','Supported ('+c.YES+')')}${chip('all','All ('+all.length+')')}</div>

    <tbody id="ctbody"></tbody></table>`;
  const draw=()=>{ const q=(document.getElementById("csearch").value||"").toLowerCase();
    const list=all.filter(sets[_cf]).filter(r=>!q||(r.topic||"").toLowerCase().includes(q));

      ||'<tr><td colspan="5" class="muted" style="padding:16px">No matching votes.</td></tr>'; };
  document.getElementById("csearch").oninput=draw;
  document.querySelector(".fbar").onclick=e=>{ const b=e.target.closest("button[data-f]"); if(!b)return; _cf=b.dataset.f; renderCouncil(); };
  draw();
}

    <div id="pstaged" class="hidden"></div>`;
  const cd=()=>{ const ms=FILING_DEADLINE-new Date(); if(ms<=0){renderPromises();return;}
    const d=Math.floor(ms/86400000),h=Math.floor(ms/3600000)%24,m=Math.floor(ms/60000)%60,s=Math.floor(ms/1000)%60;
    const el=document.getElementById("pcd"); if(el) el.textContent=`${d}d ${h}h ${m}m ${s}s`; };
  cd(); if(window._pcd) clearInterval(window._pcd); window._pcd=setInterval(cd,1000);
  document.getElementById("pprev").onclick=()=>{
    const st=document.getElementById("pstaged");
    st.classList.remove("hidden");
    st.innerHTML=`<div class="sect-title" style="margin-top:20px">Staged records (pre-writ documented positions)</div>`+S.promises.map(promiseCard).join("");
    document.getElementById("pprev").style.display="none";
  };
}

// ── ROMULUS chat ──
const chatHistory=[];
function md(t){
  let h=esc(t);
  // [label](url) -> link
  h=h.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1 ↗</a>');
  // [bare-url] -> link
  h=h.replace(/\[(https?:\/\/[^\]\s]+)\]/g,'<a href="$1" target="_blank" rel="noopener">source ↗</a>');
  // remaining bare urls (not already inside an attribute/tag)
  h=h.replace(/(^|[^"=>\]])(https?:\/\/[^\s<)\]]+)/g,'$1<a href="$2" target="_blank" rel="noopener">source ↗</a>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/(^|[\s>(])_([^_\n]{1,140}?)_(?=[\s<.,;:)]|$)/g,'$1<i>$2</i>');
  h=h.replace(/^###\s?(.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/(?:^|\n)\s*[-*]\s+(.+)/g,'\n<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,m=>'<ul>'+m.replace(/\n/g,'')+'</ul>');
  return h.replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
}
function addMsg(cls,html){ const d=document.createElement('div'); d.className='msg '+cls; d.innerHTML=html;
  document.getElementById('chatlog').appendChild(d); d.scrollIntoView({behavior:'smooth',block:'end'}); return d; }
async function askRomulus(){
  const inp=document.getElementById('chatinput'); const q=inp.value.trim(); if(!q) return;
  inp.value=''; inp.style.height='auto'; document.getElementById('chatsend').disabled=true;
  addMsg('user',esc(q)); chatHistory.push({role:'user',content:q});
  const think=addMsg('bot think','ROMULUS is analysing the dossier…');
  try{
    const r=await fetch(ROMULUS_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},body:JSON.stringify({messages:chatHistory.slice(-8)})});
    const data=await r.json();
    if(!r.ok||data.error){ think.className='msg bot'; think.innerHTML='<span style="color:var(--red)">Error: '+esc(data.error||('HTTP '+r.status))+'</span>'; }
    else { think.className='msg bot'; think.innerHTML=md(data.reply||'(no reply)'); chatHistory.push({role:'assistant',content:data.reply||''}); }
  }catch(e){ think.className='msg bot'; think.innerHTML='<span style="color:var(--red)">'+esc(String(e))+'</span><br><span class="faint">Is the romulus function deployed?</span>'; }
  document.getElementById('chatsend').disabled=false; inp.focus();
}
function wireChat(){
  const sug=["What are Tedjo's strongest vulnerabilities?","Summarize the housing contradiction, with sources.","What should Tedjo lead his OWN campaign with?","Which circulating claims are NOT verifiable in the record?"];
  document.getElementById('chatsug').innerHTML=sug.map(s=>`<button>${esc(s)}</button>`).join('');
  document.getElementById('chatsug').onclick=e=>{ const b=e.target.closest('button'); if(!b)return; document.getElementById('chatinput').value=b.textContent; askRomulus(); };
  document.getElementById('chatsend').onclick=askRomulus;
  const inp=document.getElementById('chatinput');
  inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askRomulus();} });
}
wireChat();

function renderHQ(){
  const box=document.getElementById("view-hq");
  box.innerHTML=`
    <div class="pitch"><h3 style="margin:0 0 6px;color:var(--gold)">ROMULUS HQ</h3>
      <p style="margin:0">Select a municipality, then a candidate. Each client runs in its own isolated Supabase silo — data never crosses between clients.</p></div>
    ${Object.keys(CLIENTS).map(m=>`
      <div class="hq-muni-h">⌂ ${esc(m)}</div>
      <div class="hq-cards">
        ${Object.keys(CLIENTS[m].candidates).map(name=>{ const c=CLIENTS[m].candidates[name];
          const live=c.status==="live"&&c.url;
          return `<div class="hq-card ${live?'':'pending'}" data-muni="${esc(m)}" data-cand="${esc(name)}">
            <div class="hq-av">${esc(name.split(" ").map(x=>x[0]).join("").slice(0,2))}</div>
            <div style="flex:1"><div style="font-weight:700">${esc(name)}</div>
              <div class="muted" style="font-size:12.5px">${esc(c.office||"")}</div></div>
            <span class="hq-status ${live?'on':''}">${live?'● LIVE':'○ not connected'}</span></div>`;}).join("")}
      </div>`).join("")}
    <div class="faint" style="font-size:12px;margin-top:14px">Developer view. To add a client: create its Supabase project, load its data, then register its URL + publishable key in <code>CLIENTS</code>.</div>`;
  box.querySelectorAll(".hq-card").forEach(el=>el.onclick=()=>{
    const c=CLIENTS[el.dataset.muni].candidates[el.dataset.cand];
    if(c.status==="live"&&c.url) connectClient(el.dataset.muni, el.dataset.cand);
    else alert(c.note||"This client isn't connected yet.");
  });
}
function connectClient(muni, cand){
  const c=CLIENTS[muni].candidates[cand];
  SUPABASE_URL=c.url.replace(/\/+$/,""); SUPABASE_KEY=c.key;
  REST=SUPABASE_URL+"/rest/v1"; ROMULUS_FN=SUPABASE_URL+"/functions/v1/romulus";
  ACTIVE={muni,cand,office:c.office};
  document.getElementById("activeClient").innerHTML="Target: <b>"+esc(cand)+"</b><br>"+esc(muni)+" · "+esc(c.office||"");
  document.getElementById("conn").textContent="connecting…";
  for(const k in S){ if(Array.isArray(S[k])) S[k]=[]; } S.counts={};
  chatHistory.length=0; const cl=document.getElementById("chatlog"); if(cl) cl.innerHTML="";
  document.querySelector('button[data-tab="home"]').click();
  init();
}
